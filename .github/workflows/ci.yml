name: CI — TradeOS Core

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.11.0"

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    outputs:
      ai-core-changed: ${{ steps.path-filter.outputs.ai-core }}
      schema-changed: ${{ steps.path-filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - uses: dorny/paths-filter@v3
        id: path-filter
        with:
          filters: |
            ai-core:
              - 'packages/ai-core/**'
            schema:
              - 'packages/database/prisma/schema.prisma'
      - run: pnpm install --frozen-lockfile
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1

  typecheck:
    name: TypeScript Strict Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tradeos_test"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/tradeos_test"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build

  test:
    name: Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  docs-check:
    name: Docs Parity Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:check

  route-actions-check:
    name: Route Action Parity Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm routes:check

  license-check:
    name: License Compliance Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm license:check

  ai-eval:
    name: AI Evaluation (ai-core)
    needs: install
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.install.outputs.ai-core-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @tradeos/ai-core eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  e2e-test:
    name: E2E Smoke Tests
    needs: install
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Install Playwright Chromium
        run: pnpm --filter @tradeos/web exec playwright install chromium
      - name: Run E2E tests (skipped when E2E_RUN_ENABLED is not true)
        run: pnpm --filter @tradeos/web test:e2e

  schema-change-check:
    name: Schema Change Gate
    needs: install
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.install.outputs.schema-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm build
      - name: Verify migration file exists
        run: |
          MIGRATIONS=$(ls -d packages/database/prisma/migrations/*/ 2>/dev/null | wc -l)
          if [ "$MIGRATIONS" -eq 0 ]; then
            echo "❌ No migration directory found. Create a migration when schema.prisma changes."
            exit 1
          fi
          echo "✅ Migration file(s) present"
      - name: Check no db push usage
        run: |
          echo "Schema change detected — verifying migration method."
          echo "Migration files present — db push is not needed."
          echo "✅ No db push detected"

  whitespace:
    name: Whitespace Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git diff --check

  final-gate:
    name: Final Gate
    if: always()
    needs:
      - typecheck
      - build
      - test
      - lint
      - docs-check
      - route-actions-check
      - license-check
      - whitespace
      - e2e-test
      - schema-change-check
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== CI Gate Summary ==="
          echo "typecheck:             ${{ needs.typecheck.result }}"
          echo "build:                 ${{ needs.build.result }}"
          echo "test:                  ${{ needs.test.result }}"
          echo "lint:                  ${{ needs.lint.result }}"
          echo "docs-check:            ${{ needs.docs-check.result }}"
          echo "route-actions-check:   ${{ needs.route-actions-check.result }}"
          echo "license-check:         ${{ needs.license-check.result }}"
          echo "whitespace:            ${{ needs.whitespace.result }}"
          echo "e2e-test:              ${{ needs.e2e-test.result }}"
          echo "schema-change-check:   ${{ needs.schema-change-check.result }}"
      - if: >
          needs.typecheck.result != 'success' ||
          needs.build.result != 'success' ||
          needs.test.result != 'success' ||
          needs.lint.result != 'success' ||
          needs.docs-check.result != 'success' ||
          needs.route-actions-check.result != 'success' ||
          needs.license-check.result != 'success' ||
          needs.whitespace.result != 'success' ||
          needs.e2e-test.result == 'failure' ||
          needs.schema-change-check.result == 'failure'
        run: exit 1

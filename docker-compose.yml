services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeos
    ports:
      - "5432:5432"
    volumes:
      - tradeos_postgres_data:/var/lib/postgresql/data

volumes:
  tradeos_postgres_data:
